name: Build KisekiKernel

on:
  workflow_dispatch:
    inputs:      
      tag:
        description: 'Release Tag (OneUI7-990)'
        required: true        
        default: 'OneUI7-990'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      
    strategy:
      fail-fast: false
      matrix:
        # Keep exactly the 4 LTE Non-GKI variants for Exynos 990 as requested
        target: [c2slte, c1slte, x1slte, y2slte]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "::group:: Cleaning up pre-installed software to free space"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          echo "::endgroup::"

# Added cleanup for GitHub's broken azure-cli repo so it doesn't cause exit code 100
      - name: Set up build environment
        run: |
          echo "::group:: Installing dependencies and tools"
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -yq \
            p7zip-full jq attr ccache clang ffmpeg golang \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp \
            curl xxd patchelf flex bison libarchive-tools build-essential pcre2-utils zip \
            llvm lld  # Added this group to fix the '/bin/sh: llvm-ar: not found' error
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"
      - name: Set up CCache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      # KernelSU-Next needs "manual hooks" wired into a handful of syscall handlers
      # (fs/exec.c, fs/open.c, fs/read_write.c, fs/stat.c, drivers/input/input.c) to be
      # recognized by the Manager app on non-GKI kernels - kprobes are avoided here since
      # they're known to conflict with Samsung Exynos RKP/KDP and can cause bootloops.
      # This uses devnoname120/kernelsu-coccinelle's "scope-minimized-hooks" (built for
      # KernelSU-Next specifically), which applies semantic patches robustly even on a
      # heavily modified vendor kernel like this one.
      # IMPORTANT: per that tool's own README, these hooks must be applied to a CLEAN
      # kernel source - before any KernelSU or SUSFS patches - so this step runs first.
      - name: Apply KernelSU-Next manual hooks (Coccinelle scope-minimized-hooks)
        run: |
          set -e
          sudo apt-get install -yq coccinelle
          git clone https://github.com/devnoname120/kernelsu-coccinelle.git /tmp/kernelsu-coccinelle
          cd /tmp/kernelsu-coccinelle/scope-minimized-hooks
          ./apply.sh "$GITHUB_WORKSPACE"

      # Pin susfs4ksu to a specific, known-good commit on the kernel-4.19 branch instead of
      # the stale "1.4.2-kernel-4.19" tag. NOTE: as of the last run, this branch's HEAD
      # reports SUSFS_VERSION v1.5.5 - NOT v2.0.0. The v2.0.0/v2.1.0 builds seen elsewhere
      # (e.g. ExtremeXT's release) likely use a different/private source, not this public
      # branch as-is. There is NO "v2.5.0" or "v2.2.0" anywhere in SUSFS's history.
      - name: Patch SUSFS (KSU Next Support)
        run: |
          set -e

          # 1. Clone the kernel-4.19 branch (shallow is fine, we just need the tree)
          git clone -b kernel-4.19 https://gitlab.com/simonpunk/susfs4ksu.git susfs

          echo "=== Detected SUSFS_VERSION in this checkout ==="
          grep -R "SUSFS_VERSION" susfs/kernel_patches/include/linux/susfs.h 2>/dev/null || \
            echo "(SUSFS_VERSION string not found - check susfs.h manually if this matters)"

          # 2. Copy filesystem-side files (including sus_su.c support) into the kernel source
          cp -r susfs/kernel_patches/fs/* fs/
          cp -r susfs/kernel_patches/include/linux/* include/linux/

          # 3. Do NOT create a second copy of susfs.c under kernel/susfs/.
          # susfs.c is already placed correctly at fs/susfs.c by step 2 above, and the
          # 50_add_susfs_in_kernel-4.19.patch (step 4 below) already patches fs/Makefile to
          # build susfs.o right there in fs/ - where fs/internal.h lives in the same directory.
          # An extra copy under kernel/susfs/ fails to compile with:
          #   fatal error: 'internal.h' file not found
          # because the relative #include "internal.h" can't resolve from the wrong directory.

          # 4. Apply the kernel-4.19 core patch. `patch` exits non-zero if ANY hunk is
          # rejected, even if most of the file patched fine - so we capture that instead of
          # letting `set -e` kill the whole job blindly. If something rejects, we print the
          # .rej file content so the log shows exactly what conflicts, instead of guessing.
          set +e
          patch -p1 --fuzz=3 --no-backup-if-mismatch < susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch
          PATCH_EXIT=$?
          set -e

          echo ""
          echo "=== Any .rej files left behind (rejected hunks) ==="
          find . -name "*.rej" -not -path "./susfs/*" 2>/dev/null | while read -r rej; do
            echo "--- $rej ---"
            cat "$rej"
            echo ""
          done

          if [ "$PATCH_EXIT" -ne 0 ]; then
            echo "!!! WARNING: 50_add_susfs_in_kernel-4.19.patch had rejected hunks (see above)."
            echo "!!! Continuing the build anyway since most hunks applied - if compilation"
            echo "!!! fails later referencing fs/namespace.c, the rejected hunk above is why."
          fi

          # 5. Do NOT patch KernelSU-Next with 10_enable_susfs_for_ksu.patch (confirmed from
          # an earlier failed run: the current KernelSU-Next codebase has been restructured -
          # old kernel/core_hook.c, kernel/ksu.c, etc. no longer exist at those paths, the
          # logic moved into drivers/kernelsu/*). The generic patch from simonpunk targets the
          # old file layout and will never apply cleanly here.
          #
          # This step does NOT guess the new structure - it prints real data so the log tells
          # us exactly what's there, instead of relying on assumptions.
          if [ -d "KernelSU-Next" ]; then
            echo "=== KernelSU-Next subdirectory listing (2 levels deep) ==="
            find KernelSU-Next -maxdepth 2 -type d | sort

            echo ""
            echo "=== Files containing 'susfs' (case-insensitive) ==="
            grep -ril susfs KernelSU-Next 2>/dev/null || echo "(no file containing 'susfs' found)"

            echo ""
            echo "=== Contents of KernelSU-Next/kernel/Kconfig (if present) ==="
            cat KernelSU-Next/kernel/Kconfig 2>/dev/null || echo "(KernelSU-Next/kernel/Kconfig does not exist)"

            echo ""
            echo "=== Contents of KernelSU-Next/drivers/kernelsu/Kconfig (if present) ==="
            cat KernelSU-Next/drivers/kernelsu/Kconfig 2>/dev/null || echo "(KernelSU-Next/drivers/kernelsu/Kconfig does not exist)"

            echo ""
            echo "=== Checking for a SUSFS 'spoof version' Kconfig option ==="
            grep -ril "SPOOF" KernelSU-Next/kernel/Kconfig KernelSU-Next/drivers/kernelsu/Kconfig 2>/dev/null || \
              echo "(no SPOOF-related Kconfig option found here - version spoofing on SUSFS is" \
                   "usually a runtime/module-level toggle via the SUSFS manager, not a build-time flag)"

            echo ""
            echo "=== Current commit of the KernelSU-Next submodule ==="
            git -C KernelSU-Next log -1 --oneline 2>/dev/null || echo "(could not read git log)"
          fi

      # Fix a silent bug in the original build.sh: the two mkdtimg commands that create
      # dtb.img/dtbo.img have no "|| abort" attached, so if they fail, the script keeps
      # going and the error only surfaces later, at the wrong spot, in the "Building zip"
      # step (cp: cannot stat dtbo.img: No such file or directory).
      - name: Patch build.sh (fail fast on mkdtimg errors)
        run: |
          set -e
          sed -i \
            -e 's@\(./toolchain/mkdtimg cfg_create build/out/\$MODEL/dtb\.img build/dtconfigs/exynos9830\.cfg -d out/arch/arm64/boot/dts/exynos\)$@\1 || abort@' \
            -e 's@\(./toolchain/mkdtimg cfg_create build/out/\$MODEL/dtbo\.img build/dtconfigs/\$MODEL\.cfg -d out/arch/arm64/boot/dts/samsung\)$@\1 || abort@' \
            build.sh
          echo "=== Verifying the two mkdtimg lines after patching ==="
          grep -n "mkdtimg cfg_create" build.sh

      # Run build.sh to compile the kernel into a flashable zip.
      # The -s y flag was removed because the original build script doesn't support it.
      - name: Run kernel build
        run: |
          chmod +x ./build.sh
          ./build.sh -m ${{ matrix.target }} -k y

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-${{ matrix.target }}-zip
          path: build/out/${{ matrix.target }}/*.zip
          compression-level: 6

  release:
    needs: build 
    runs-on: ubuntu-24.04
    permissions:
      contents: write 
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Flatten artifacts directory structure
        run: |
          mkdir -p final_artifacts
          if [ -d "raw_artifacts" ]; then
            find raw_artifacts/ -name "*.zip" -exec cp {} final_artifacts/ \;
          fi
          echo "Collected zip files:"
          ls -l final_artifacts/

      - name: Generate Safe Git Tag
        id: git_tag
        run: |
          SAFE_TAG=$(echo "${{ github.event.inputs.tag }}" | sed 's/[\/\\:*?"<>|]/-/g')
          echo "SAFE_TAG=$SAFE_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.SAFE_TAG }}
          name: "${{ github.event.inputs.tag }}"
          draft: false
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "final_artifacts/*.zip"
          body: |
            ## 🚀 Official Release for KisekiKernel 990 (LTE Variants Only)
            
            Automated build generated by GitHub Actions.
            
            - **Commit SHA:** `${{ github.sha }}`
            - **Tag Reference:** `${{ env.SAFE_TAG }}`
            - **Features:** Built-in KernelSU-Next (v3.2.0) + SuSFS (v1.5.5, Non-GKI kernel-4.19)
                        
            #### 🔹 Galaxy S20 Series (LTE)
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy S20 LTE | `x1slte` | `KisekiKernel-x1slte-*.zip` |
            | Galaxy S20+ LTE | `y2slte` | `KisekiKernel-y2slte-*.zip` |
            
            #### 🔹 Galaxy Note 20 Series (LTE)
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy Note 20 LTE | `c1slte` | `KisekiKernel-c1slte-*.zip` |
            | Galaxy Note 20 Ultra LTE | `c2slte` | `KisekiKernel-c2slte-*.zip` |
            
            _Note: Ensure you are on the correct firmware base before flashing._
