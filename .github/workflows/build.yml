name: Build KisekiKernel

on:
  workflow_dispatch:
    inputs:      
      tag:
        description: 'Release Tag (OneUI7-990)'
        required: true        
        default: 'OneUI7-990'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      
    strategy:
      fail-fast: false
      matrix:
        target: [c2s, c1s, r8s, x1s, y2s, z3s]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "::group:: Cleaning up pre-installed software to free space"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          echo "::endgroup::"

      - name: Set up build environment
        run: |
          echo "::group:: Installing dependencies and tools"
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -yq \
            p7zip-full jq attr ccache clang ffmpeg golang \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp \
            curl xxd patchelf flex bison libarchive-tools build-essential pcre2-utils
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

      - name: Set up CCache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      - name: Build kernel (${{ matrix.target }})
        env:
          USE_CCACHE: 1
          CCACHE_DIR: ~/.cache/ccache
        run: |
          chmod +x build.sh
          ./build.sh -m ${{ matrix.target }} -k y -r n

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-${{ matrix.target }}-zip
          path: build/out/${{ matrix.target }}/*.zip
          compression-level: 6

  release:
    needs: build 
    runs-on: ubuntu-24.04
    permissions:
      contents: write 
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Flatten artifacts directory structure
        run: |
          mkdir -p final_artifacts
          find raw_artifacts/ -name "*.zip" -exec cp {} final_artifacts/ \;

      - name: Generate Safe Git Tag
        id: git_tag
        run: |
          SAFE_TAG=$(echo "${{ inputs.tag }}" | sed 's/[\/\\:*?"<>|]/-/g')
          echo "SAFE_TAG=$SAFE_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.SAFE_TAG }}
          name: "${{ inputs.tag }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }} 
          artifacts: "final_artifacts/*.zip"
          body: |
            ##  Official Release for KisekiKernel 990
            
            Automated build generated by GitHub Actions.
            
            - **Commit SHA:** `${{ github.sha }}`
            - **Tag Reference:** `${{ env.SAFE_TAG }}`
                        
            #### 🔹 Galaxy S20 Series
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy S20 | `x1s` | `KisekiKernel-x1s-*.zip` |
            | Galaxy S20+ | `y2s` | `KisekiKernel-y2s-*.zip` |
            | Galaxy S20 Ultra | `z3s` | `KisekiKernel-z3s-*.zip` |
            | Galaxy S20 FE | `r8s` | `KisekiKernel-r8s-*.zip` |
            
            #### 🔹 Galaxy Note 20 Series
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy Note 20 | `c1s` | `KisekiKernel-c1s-*.zip` |
            | Galaxy Note 20 Ultra | `c2s` | `KisekiKernel-c2s-*.zip` |
            
            _Note:Ensure you are on the correct firmware base before flashing._
