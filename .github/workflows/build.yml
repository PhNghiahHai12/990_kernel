name: Build KisekiKernel

on:
  workflow_dispatch:
    inputs:      
      tag:
        description: 'Release Tag (OneUI7-990)'
        required: true        
        default: 'OneUI7-990'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      
    strategy:
      fail-fast: false
      matrix:
        # Giữ đúng 4 bản LTE Non-GKI cho Exynos 990 theo yêu cầu
        target: [c2slte, c1slte, x1slte, y2slte]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        run: |
          echo "::group:: Cleaning up pre-installed software to free space"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          echo "::endgroup::"

# Đã thêm lệnh dọn dẹp repo azure-cli bị lỗi của GitHub để không bị exit code 100
      - name: Set up build environment
        run: |
          echo "::group:: Installing dependencies and tools"
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -yq \
            p7zip-full jq attr ccache clang ffmpeg golang \
            libbrotli-dev libgtest-dev libprotobuf-dev libunwind-dev libpcre2-dev \
            libzstd-dev linux-modules-extra-$(uname -r) lld protobuf-compiler webp \
            curl xxd patchelf flex bison libarchive-tools build-essential pcre2-utils zip \
            llvm lld  # Thêm cụm này để fix lỗi '/bin/sh: llvm-ar: not found'
          sudo modprobe erofs f2fs
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"
      - name: Set up CCache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.target }}-

      # Ghim đúng 1 tag cụ thể của susfs4ksu thay vì clone HEAD của nhánh (HEAD trôi nổi
      # theo thời gian -> build không tái lập được, là nguyên nhân chính gây lỗi "thỉnh thoảng").
      # Tag mới nhất hiện có cho kernel-4.19 trên simonpunk/susfs4ksu là 1.4.2-kernel-4.19
      # (repo gốc KHÔNG có tag "v2.5.0" cho nhánh kernel-4.19).
      - name: Patch SUSFS 1.4.2 (KSU Next Support)
        env:
          SUSFS_TAG: 1.4.2-kernel-4.19
        run: |
          set -e

          # 1. Clone đúng tag cố định để build luôn tái lập được
          git clone -b "$SUSFS_TAG" --depth 1 https://gitlab.com/simonpunk/susfs4ksu.git susfs

          # 2. Copy file hệ thống bao gồm cả sus_su.c dành riêng cho KSU Next vào kernel source
          cp -r susfs/kernel_patches/fs/* fs/
          cp -r susfs/kernel_patches/include/linux/* include/linux/

          # 3. Tạo thư mục kernel/susfs/ và đưa mã nguồn SUSFS vào đúng vị trí biên dịch
          mkdir -p kernel/susfs
          cp susfs/kernel_patches/fs/susfs.c kernel/susfs/

          # Tự tạo file Makefile chuẩn cho susfs để trình biên dịch không báo lỗi No such file
          echo "obj-y += susfs.o" > kernel/susfs/Makefile

          # 4. Áp dụng file patch lõi 4.19. Không còn "|| true": nếu patch fail thật,
          # step này phải đỏ ngay tại đây thay vì để cây kernel half-patched trôi
          # xuống bước build/đóng gói rồi mới lộ lỗi khó hiểu.
          patch -p1 --fuzz=3 --no-backup-if-mismatch < susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch

          # 5. KHÔNG patch KernelSU-Next bằng 10_enable_susfs_for_ksu.patch nữa.
          # Lý do (đã xác nhận từ log lỗi thật): bản KernelSU-Next hiện tại (org
          # KernelSU-Next/KernelSU-Next, nhánh legacy) đã refactor toàn bộ code từ
          # kernel/core_hook.c, kernel/ksu.c, kernel/sucompat.c... (cấu trúc cũ mà patch
          # generic của simonpunk nhắm tới) sang drivers/kernelsu/*.c kiểu LSM hook mới.
          # Patch cũ luôn báo "can't find file to patch" vì các file đích không còn tồn tại
          # ở đường dẫn cũ - đây là lỗi cấu trúc, không phải lỗi fuzz/offset nên không vá được
          # bằng cách nới fuzz. KernelSU-Next bản mới đã tự hỗ trợ SUSFS thông qua Kconfig
          # riêng của nó (CONFIG_KSU_SUSFS), nên bước dưới đây chỉ kiểm tra config đó có tồn
          # tại không, thay vì cố patch file không còn khớp.
          if [ -d "KernelSU-Next" ]; then
            if grep -rq "KSU_SUSFS" KernelSU-Next/drivers/kernelsu/Kconfig 2>/dev/null || \
               grep -rq "KSU_SUSFS" KernelSU-Next/kernel/Kconfig 2>/dev/null; then
              echo "=== KernelSU-Next đã có sẵn Kconfig cho SUSFS (CONFIG_KSU_SUSFS), không cần patch generic ==="
            else
              echo "!!! CANH BAO: khong tim thay CONFIG_KSU_SUSFS trong Kconfig cua KernelSU-Next."
              echo "!!! submodule co the da doi cau truc lan nua, can kiem tra thu cong."
            fi
          elif [ -d "drivers/kernelsu" ]; then
            cd drivers/kernelsu
            patch -p1 --fuzz=3 --no-backup-if-mismatch < ../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch
            cd ../..
          fi

          # 6. Kích hoạt build susfs trong kernel Makefile phòng trường hợp patch bị lệch dòng
          if ! grep -q "susfs" kernel/Makefile; then
            echo "obj-y += susfs/" >> kernel/Makefile
          fi

      # Vá lỗi im lặng trong build.sh gốc: 2 lệnh mkdtimg tạo dtb.img/dtbo.img không có
      # "|| abort" đi kèm, nên nếu chúng fail, script vẫn chạy tiếp và lỗi chỉ lộ ra sai chỗ
      # ở bước "Building zip" (cp: cannot stat dtbo.img: No such file or directory).
      - name: Patch build.sh (fail fast on mkdtimg errors)
        run: |
          set -e
          sed -i \
            -e "s|\(./toolchain/mkdtimg cfg_create build/out/\$MODEL/dtb\.img build/dtconfigs/exynos9830\.cfg -d out/arch/arm64/boot/dts/exynos\)$|\1 || abort|" \
            -e "s|\(./toolchain/mkdtimg cfg_create build/out/\$MODEL/dtbo\.img build/dtconfigs/\$MODEL\.cfg -d out/arch/arm64/boot/dts/samsung\)$|\1 || abort|" \
            build.sh
          echo "=== Kiểm tra lại 2 dòng mkdtimg sau khi patch ==="
          grep -n "mkdtimg cfg_create" build.sh

      # Chạy lệnh build.sh để biên dịch kernel thành file zip
      # Bỏ flag -s y vì script build gốc không hỗ trợ tham số này
      - name: Run kernel build
        run: |
          chmod +x ./build.sh
          ./build.sh -m ${{ matrix.target }} -k y

      - name: Upload artifact (${{ matrix.target }})
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-${{ matrix.target }}-zip
          path: build/out/${{ matrix.target }}/*.zip
          compression-level: 6

  release:
    needs: build 
    runs-on: ubuntu-24.04
    permissions:
      contents: write 
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Flatten artifacts directory structure
        run: |
          mkdir -p final_artifacts
          if [ -d "raw_artifacts" ]; then
            find raw_artifacts/ -name "*.zip" -exec cp {} final_artifacts/ \;
          fi
          echo "Danh sách file zip thu thập được:"
          ls -l final_artifacts/

      - name: Generate Safe Git Tag
        id: git_tag
        run: |
          SAFE_TAG=$(echo "${{ github.event.inputs.tag }}" | sed 's/[\/\\:*?"<>|]/-/g')
          echo "SAFE_TAG=$SAFE_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.SAFE_TAG }}
          name: "${{ github.event.inputs.tag }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "final_artifacts/*.zip"
          body: |
            ## 🚀 Official Release for KisekiKernel 990 (LTE Variants Only)
            
            Automated build generated by GitHub Actions.
            
            - **Commit SHA:** `${{ github.sha }}`
            - **Tag Reference:** `${{ env.SAFE_TAG }}`
            - **Features:** Built-in KernelSU-Next (v3.2.0) + SuSFS 1.4.2 (Non-GKI kernel-4.19)
                        
            #### 🔹 Galaxy S20 Series (LTE)
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy S20 LTE | `x1slte` | `KisekiKernel-x1slte-*.zip` |
            | Galaxy S20+ LTE | `y2slte` | `KisekiKernel-y2slte-*.zip` |
            
            #### 🔹 Galaxy Note 20 Series (LTE)
            | Device Name | Codename | File Name |
            | :--- | :--- | :--- |
            | Galaxy Note 20 LTE | `c1slte` | `KisekiKernel-c1slte-*.zip` |
            | Galaxy Note 20 Ultra LTE | `c2slte` | `KisekiKernel-c2slte-*.zip` |
            
            _Note: Ensure you are on the correct firmware base before flashing._
